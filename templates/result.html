<!DOCTYPE html>
<html>
<head>
<title>Print Photo</title>

<style>
@page {
    size: 6in 4in;
    margin: 0;
}

body {
    margin: 0;
    background: white;
}

img {
    width: 6in;
    height: 4in;
}
</style>

</head>
<body>

<img src="{{ url_for('static', filename=image) }}">

<script>
window.onload = function() {
    window.print();
}
</script>

</body>
</html>
